name: Review Bot (PR)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [ "master" ]
  workflow_dispatch:  # 수동 실행도 가능

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: [self-hosted, escargot-review]
    timeout-minutes: 60  # Job 전체 타임아웃: 60분

    steps:
      - name: Compute diff range (incremental on synchronize)
        id: shas
        uses: actions/github-script@v7
        with:
          script: |
            const action = context.payload.action;
            const pr = context.payload.pull_request.number;
            const baseSha = context.payload.pull_request.base.sha;
            const headSha = context.payload.pull_request.head.sha;

            let base = baseSha;
            let skip = false;
            if (action === 'synchronize') {
              const before = context.payload.before;
              if (before) {
                base = before;
              } else {
                skip = true;
              }
            }

            core.setOutput('base', base);
            core.setOutput('head', headSha);
            core.setOutput('pr', pr);
            core.setOutput('skip', String(skip));
            
            console.log(`Review range: ${base}..${headSha} (PR #${pr})`);

      - name: Skip review (no before on synchronize)
        if: ${{ steps.shas.outputs.skip == 'true' }}
        run: |
          echo "[Review Bot] Skipping review: 'before' SHA missing on synchronize event."

      - name: Call review server
        id: call
        if: ${{ steps.shas.outputs.skip != 'true' }}
        env:
          REVIEW_SERVER: ${{ secrets.REVIEW_SERVER || secrets.REVIEW_SERVER_URL || 'http://localhost:8001' }}
        run: |
          set -euo pipefail
          REVIEW_SERVER="${REVIEW_SERVER}"
          BASE_SHA="${{ steps.shas.outputs.base }}"
          HEAD_SHA="${{ steps.shas.outputs.head }}"
          PR_NUMBER="${{ steps.shas.outputs.pr }}"

          echo "Calling review API at ${REVIEW_SERVER}/review"
          echo "PR #${PR_NUMBER}: ${BASE_SHA}..${HEAD_SHA}"

          curl -sS --fail-with-body --show-error \
            --connect-timeout 10 --max-time 2400 \
            -X POST "${REVIEW_SERVER}/review" \
            -H "Content-Type: application/json" \
            -d "{\"base_sha\":\"${BASE_SHA}\",\"head_sha\":\"${HEAD_SHA}\",\"pull_request_number\":${PR_NUMBER}}" \
            -o review.json

          echo "==== review.json ===="
          cat review.json

          # 댓글 개수 확인
          comments_count=$(jq '.comments | length' review.json || echo "0")
          echo "comments_count=${comments_count}" >> $GITHUB_OUTPUT

          if [ "${comments_count}" -eq 0 ]; then
            echo "✅ 리뷰 완료: 댓글이 없습니다."
          else
            echo "✅ 리뷰 완료: ${comments_count}개의 댓글 생성됨"
          fi

      - name: Post review comments
        if: ${{ steps.shas.outputs.skip != 'true' && steps.call.outputs.comments_count > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request.number;
            let raw;
            try {
              raw = fs.readFileSync('review.json', 'utf8');
            } catch (e) {
              core.warning(`review.json not found: ${e}`);
              return;
            }
            let data;
            try {
              data = JSON.parse(raw);
            } catch (e) {
              core.warning(`Failed to parse review.json as JSON: ${e}`);
              return;
            }
            const comments = Array.isArray(data.comments) ? data.comments : [];

            console.log(`Posting ${comments.length} review comments...`);

            let successCount = 0;
            let errorCount = 0;

            for (const c of comments) {
              try {
                await github.request('POST /repos/{owner}/{repo}/pulls/{pull_number}/comments', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr,
                  body: c.body,
                  commit_id: c.commit_id,
                  path: c.path,
                  line: c.line,
                  side: c.side,
                  headers: { 'accept': 'application/vnd.github+json' }
                });

                successCount++;
                console.log(`✅ Posted comment on ${c.path}:${c.line}`);

                // Rate limit 방지를 위한 딜레이 (200ms)
                await new Promise(r => setTimeout(r, 200));
              } catch (error) {
                errorCount++;
                console.error(`❌ Failed to post comment on ${c.path}:${c.line}`, error.message);
              }
            }

            console.log(`\n📊 결과: ${successCount}개 성공, ${errorCount}개 실패`);

